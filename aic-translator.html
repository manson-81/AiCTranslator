const EXAMPLES = [
  "I can't stop thinking about the past",
  "I feel totally numb today",
  "Nobody understands what I'm going through",
  "I'm stuck in a cycle I can't escape",
  "The world feels dark and heavy",
  "I'm my own worst enemy",
];

const history = [];

// Render example chips
const chipsEl = document.getElementById('chips');
EXAMPLES.forEach(s => {
  const btn = document.createElement('button');
  btn.className = 'chip';
  btn.textContent = s;
  btn.onclick = () => {
    document.getElementById('user-input').value = s;
    updateBtn();
  };
  chipsEl.appendChild(btn);
});

const inputEl = document.getElementById('user-input');
const btnEl = document.getElementById('translate-btn');

function updateBtn() {
  btnEl.disabled = !inputEl.value.trim();
}

inputEl.addEventListener('input', updateBtn);
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) translate();
});

btnEl.addEventListener('click', translate);

async function translate() {
  const input = inputEl.value.trim();
  if (!input) return;

  // Show loading
  document.getElementById('loading').classList.add('visible');
  document.getElementById('result-section').classList.remove('visible');
  document.getElementById('error-box').classList.remove('visible');
  btnEl.disabled = true;

  const prompt = `You are an expert on Alice in Chains. Below is a bank of REAL Alice in Chains lyrics, organized by song. A user has given you a sentence. Your job is to find the 1-2 lines from the lyric bank below that best capture the same emotional essence.

CRITICAL RULES:
- You MUST only return lyrics that appear EXACTLY in the lyric bank below. Do not invent or modify lyrics.
- Return only 1-2 lines (the most emotionally resonant fragment), NOT an entire verse or chorus.
- Pick the single best match. Quality over quantity.

LYRIC BANK:
${LYRIC_BANK}

User's sentence: "${input}"

Respond ONLY with valid JSON — no markdown, no backticks:
{
  "lyric": "the exact 1-2 lines from the bank above",
  "song": "Song Title",
  "album": "Album Name (Year)",
  "connection": "One sentence explaining the emotional link, written in a moody, contemplative tone."
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }],
      }),
    });

    const data = await res.json();
    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    document.getElementById('lyric-text').textContent = parsed.lyric;
    document.getElementById('song-attribution').textContent = `— ${parsed.song} · ${parsed.album}`;
    document.getElementById('interp-text').textContent = parsed.connection;

    // Trigger re-animation
    const rs = document.getElementById('result-section');
    rs.classList.remove('visible');
    void rs.offsetWidth;
    rs.classList.add('visible');

    // Add to history
    history.unshift({ input, ...parsed });
    if (history.length > 10) history.pop();
    renderHistory();

  } catch (err) {
    document.getElementById('error-box').classList.add('visible');
  } finally {
    document.getElementById('loading').classList.remove('visible');
    btnEl.disabled = false;
  }
}

function renderHistory() {
  const section = document.getElementById('history-section');
  const list = document.getElementById('history-list');
  list.innerHTML = '';
  history.forEach(item => {
    const div = document.createElement('div');
    div.className = 'history-item';
    div.innerHTML = `
      <div class="history-input">${escHtml(item.input)}</div>
      <div class="history-lyric">${escHtml(item.lyric)}</div>
      <div class="history-song">— ${escHtml(item.song)}</div>
    `;
    div.onclick = () => {
      inputEl.value = item.input;
      document.getElementById('lyric-text').textContent = item.lyric;
      document.getElementById('song-attribution').textContent = `— ${item.song} · ${item.album}`;
      document.getElementById('interp-text').textContent = item.connection;
      document.getElementById('result-section').classList.add('visible');
      updateBtn();
    };
    list.appendChild(div);
  });
  section.classList.toggle('visible', history.length > 0);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
